    <path d="M0,-55 C20,-55 35,-35 35,-15 C35,5 20,25 0,25" transform="rotate(120)" />
    <path d="M0,-55 C20,-55 35,-35 35,-15 C35,5 20,25 0,25" transform="rotate(180)" />
    <path d="M0,-55 C20,-55 35,-35 35,-15 C35,5 20,25 0,25" transform="rotate(240)" />
    <path d="M0,-55 C20,-55 35,-35 35,-15 C35,5 20,25 0,25" transform="rotate(300)" />
