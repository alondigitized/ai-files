<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Anthropic Claude sparkle/starburst mark -->
  <g fill="#ffffff" transform="translate(100,100)">
    <!-- Central circle -->
    <circle r="8" />
    <!-- 6 elongated rays -->
    <ellipse cx="0" cy="-42" rx="6" ry="24" />
    <ellipse cx="0" cy="-42" rx="6" ry="24" transform="rotate(60)" />
    <ellipse cx="0" cy="-42" rx="6" ry="24" transform="rotate(120)" />
    <ellipse cx="0" cy="-42" rx="6" ry="24" transform="rotate(180)" />
    <ellipse cx="0" cy="-42" rx="6" ry="24" transform="rotate(240)" />
    <ellipse cx="0" cy="-42" rx="6" ry="24" transform="rotate(300)" />
    <!-- 6 smaller outer dots -->
    <circle cx="0" cy="-75" r="5" />
    <circle cx="0" cy="-75" r="5" transform="rotate(60)" />
    <circle cx="0" cy="-75" r="5" transform="rotate(120)" />
    <circle cx="0" cy="-75" r="5" transform="rotate(180)" />
    <circle cx="0" cy="-75" r="5" transform="rotate(240)" />
    <circle cx="0" cy="-75" r="5" transform="rotate(300)" />
  </g>
</svg>