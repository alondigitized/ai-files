<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Perplexity abstract compass/arrow mark -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="round" transform="translate(100,100)">
    <!-- Diamond frame -->
    <path d="M0,-70 L70,0 L0,70 L-70,0Z" />
    <!-- Inner cross -->
    <line x1="0" y1="-70" x2="0" y2="70" />
    <line x1="-70" y1="0" x2="70" y2="0" />
    <!-- Arrow pointing up-right -->
    <path d="M0,0 L40,-40" stroke-width="8" />
    <path d="M20,-40 L40,-40 L40,-20" fill="none" stroke-width="8" />
  </g>
</svg>